<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AML-TMS Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F285A;--blue:#1E50B4;--mid:#3278DC;--lblue:#D2E4FF;--sky:#EEF5FF;
  --teal:#0F6E56;--lteal:#D0F5E4;--green:#1EA064;--lgreen:#E0F5EC;
  --orange:#B8490A;--lorange:#FDEEE5;--red:#A32D2D;--lred:#FCEAEA;
  --purple:#7832B4;--lpurp:#F0E8FF;
  --g0:#F8F9FC;--g1:#EEF0F6;--g2:#D8DCE8;--g3:#8892AA;--g4:#4A5268;
  --bg:#ffffff;--bg2:#F4F6FA;--bg3:#EEF0F6;
  --tx:#1a1a18;--tx2:#5a5a56;--bdr:#e0e0dc;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#252523;--bg3:#2c2c2a;
  --tx:#e8e8e4;--tx2:#9a9a94;--bdr:#3a3a36;--g1:#2c2c2a;--g2:#3a3a36;--g3:#6a6a64;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--tx);min-height:100vh;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:.4px}
.logo-sub{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px;letter-spacing:.5px}
.nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-sec{padding:10px 16px 3px;font-size:10px;color:rgba(255,255,255,.32);letter-spacing:.9px;font-weight:600;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.58);font-size:13px;border-left:3px solid transparent;transition:all .13s;user-select:none}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88)}
.ni.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:#5BA8FF;font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.65}
.ni.active svg{opacity:1}
.nbadge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:9px;font-weight:700;background:#E24B4A;color:#fff}
.nbadge.g{background:#1EA064}
.sfoot{padding:10px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.28);line-height:1.6}
/* TOPBAR */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg);border-bottom:1px solid var(--bdr);padding:0 22px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500;color:var(--tx)}
.topbar-r{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;background:var(--lgreen);color:var(--teal);border:1px solid #82D4B0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.content{flex:1;overflow-y:auto;padding:18px 22px}
/* CARDS */
.card{background:var(--bg);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:14px}
.ch{padding:12px 15px 9px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px}
.ct{font-size:12px;font-weight:500;color:var(--tx)}
.cb{padding:14px 15px}
/* METRICS */
.mrow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--bg2);border-radius:8px;padding:13px 14px}
.ml{font-size:10px;color:var(--tx2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.mv{font-size:22px;font-weight:500;line-height:1;color:var(--tx)}
.md{font-size:11px;margin-top:3px;color:var(--green)}
.md.r{color:var(--red)}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:12px}
/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 11px;font-size:10px;font-weight:500;color:var(--tx2);border-bottom:1px solid var(--bdr);background:var(--bg2);letter-spacing:.3px;text-transform:uppercase}
td{padding:9px 11px;border-bottom:1px solid var(--bdr);vertical-align:middle;font-size:13px;color:var(--tx)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
/* BADGES */
.bp{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9px;font-size:11px;font-weight:500;white-space:nowrap}
.bc{background:#FCEAEA;color:#A32D2D} .bh{background:#FDE8D8;color:#8B3A10}
.bm{background:#FFF3D6;color:#7A5200} .bl{background:#E0F5EC;color:#0A5C38}
.bo{background:#D2E4FF;color:#0C3E8C} .br{background:#F0E8FF;color:#5A1FA0}
.bf{background:#D0F5E4;color:#0A5C38} .bx{background:#EEF0F6;color:#4A5268}
/* RISK BAR */
.rb{height:5px;border-radius:3px;background:var(--g1)}
.rf{height:100%;border-radius:3px;transition:width .3s}
/* PIPELINE STEP */
.ps{display:flex;align-items:flex-start;gap:10px;padding:11px;border-radius:8px;border:1px solid var(--bdr);margin-bottom:7px;background:var(--bg)}
.pn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}
.pt{font-size:13px;font-weight:500;margin-bottom:2px;color:var(--tx)}
.pd{font-size:12px;color:var(--tx2);line-height:1.45}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;background:var(--lblue);color:var(--navy);font-weight:500}
/* MODEL CARD */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mcard{padding:13px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg)}
.mname{font-size:12px;font-weight:500;margin-bottom:2px;color:var(--tx)}
.mtype{font-size:11px;margin-bottom:7px}
.msr{display:flex;justify-content:space-between;font-size:11px;margin-top:3px}
.msrl{color:var(--tx2)} .msrv{font-weight:500;color:var(--tx)}
.pb{height:3px;border-radius:2px;background:var(--g1);margin-top:3px}
.pf{height:100%;border-radius:2px}
/* SHAP */
.shap-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px}
.sl{flex:0 0 170px;color:var(--tx2);text-align:right;font-size:11px}
.sbw{flex:1;background:var(--g1);border-radius:3px;height:7px;position:relative;overflow:hidden}
.sp{height:100%;border-radius:3px;background:var(--mid)}
.sn{height:100%;border-radius:3px;background:var(--orange);position:absolute;right:0;top:0}
.sv{flex:0 0 38px;text-align:right;font-weight:500;font-size:11px}
/* PHASE */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pcard{padding:13px;border-radius:8px;border:1px solid var(--bdr);background:var(--bg)}
.ph{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pnum{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.ptt{font-size:12px;font-weight:500;color:var(--tx)}
.pit{font-size:11px;color:var(--tx2);line-height:1.85}
.pst{display:inline-block;padding:1px 7px;border-radius:7px;font-size:10px;font-weight:600;margin-top:5px}
.ps-done{background:var(--lgreen);color:var(--teal)}
.ps-act{background:var(--lblue);color:var(--blue)}
.ps-up{background:var(--g1);color:var(--g3)}
/* BTN */
.btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--tx);transition:all .13s}
.btn:hover{background:var(--bg2)} .btn:active{opacity:.8}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:#162E6A}
.btn.success{background:var(--lgreen);color:var(--teal);border-color:#90D4B8}
.btn.danger{background:var(--lred);color:var(--red);border-color:#F0A0A0}
.btn.warn{background:var(--lorange);color:var(--orange);border-color:#E0B090}
.btn-row{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
/* LIVE FEED */
.lr{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px;animation:fi .35s}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.lsc{width:34px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
/* CHART */
.cw{position:relative;width:100%;height:210px}
/* FORM */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.flabel{font-size:10px;color:var(--tx2);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
input[type=number],input[type=text],select{background:var(--bg);color:var(--tx);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;font-size:13px;width:100%}
input:focus,select:focus{outline:2px solid var(--mid);outline-offset:1px}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}
/* SPINNER */
.spin{width:16px;height:16px;border:2px solid var(--g2);border-top-color:var(--mid);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.tab{padding:7px 15px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx2);transition:all .13s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
/* DETAIL */
.det-sec{margin-bottom:16px}
.det-title{font-size:10px;font-weight:500;color:var(--tx2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.txnr{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:5px;font-size:12px}
.txna{font-weight:600;font-size:13px;margin-left:auto}
/* COMP TABLE */
.ctbl td:first-child{font-size:12px;line-height:1.4}
.ctbl td:nth-child(2){font-size:11px;color:var(--tx2);line-height:1.4}
/* SCORE RESULT */
.score-big{font-size:52px;font-weight:500;line-height:1;text-align:center;margin-bottom:4px}
.score-label{font-size:12px;color:var(--tx2);text-align:center;margin-bottom:12px}
/* AUDIT */
.arow{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.ats{font-size:10px;color:var(--tx2);min-width:130px;flex-shrink:0;line-height:1.5}
.at{font-family:monospace;font-size:10px;padding:1px 5px;border-radius:3px;background:var(--g1);color:var(--tx2);margin-right:4px}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-title">AML-TMS Platform</div>
    <div class="logo-sub">AI/ML TRANSACTION MONITORING</div>
  </div>
  <div class="nav">
    <div class="nav-sec">Overview</div>
    <div class="ni active" onclick="go('dashboard')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard</div>
    <div class="nav-sec">Detection</div>
    <div class="ni" onclick="go('pipeline')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 4h12M2 8h12M2 12h12"/></svg>Data Pipeline</div>
    <div class="ni" onclick="go('models')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>ML Models</div>
    <div class="ni" onclick="go('scorer')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12L6 8l3 3 5-6"/></svg>Live Scorer</div>
    <div class="nav-sec">Investigation</div>
    <div class="ni" onclick="go('alerts')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 2a5 5 0 015 5v3l1 2H2l1-2V7a5 5 0 015-5z"/><path d="M6 13a2 2 0 004 0"/></svg>Alert Queue<span class="nbadge" id="alert-count">—</span></div>
    <div class="ni" onclick="go('cases')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="3" width="12" height="11" rx="1"/><path d="M5 3V2a1 1 0 011-1h4a1 1 0 011 1v1M5 8h6M5 11h4"/></svg>Case Management<span class="nbadge g" id="case-count">—</span></div>
    <div class="nav-sec">Deployment</div>
    <div class="ni" onclick="go('deployment')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 1l7 4v6l-7 4-7-4V5z"/></svg>Deployment</div>
    <div class="ni" onclick="go('compliance')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M8 1l5 2v5c0 3-2.5 5.5-5 7C5.5 13.5 3 11 3 8V3z"/></svg>Compliance</div>
    <div class="nav-sec">System</div>
    <div class="ni" onclick="go('audit')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 3h10v10H3z"/><path d="M6 6h4M6 9h4M6 12h2"/></svg>Audit Log</div>
  </div>
  <div class="sfoot" id="api-status">Connecting to API...</div>
</div>
<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="topbar-r">
      <div class="live-pill" id="txn-rate"><span class="dot"></span>Live</div>
      <span style="font-size:11px;color:var(--tx2)" id="clock"></span>
    </div>
  </div>
  <div class="content" id="content"><div style="padding:40px;text-align:center;color:var(--tx2)"><div class="spin"></div><div style="margin-top:10px">Loading…</div></div></div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
// API is always on the same host — works locally AND on Railway/cloud
const API = window.location.origin;
let _liveFeedTimer = null, _chartInst = {}, _detailAlertId = null;

// ── Utilities ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const sc = s => s>=85?'#E24B4A':s>=70?'#D05538':s>=55?'#BA7517':'#1EA064';
const pb = p => `<span class="bp ${({critical:'bc',high:'bh',medium:'bm',low:'bl'})[p]||'bl'}">${p}</span>`;
const sb = s => `<span class="bp ${({open:'bo',review:'br',filed:'bf',cleared:'bx'})[s]||'bo'}">${s}</span>`;
const fmt = n => '$'+(+n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
function toast(msg,dur=3000){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

async function api(path, opts={}) {
  try {
    const r = await fetch(API+path, {headers:{'Content-Type':'application/json'},...opts});
    return r.json();
  } catch(e) { return null; }
}

setInterval(()=>{ $('clock').textContent=new Date().toLocaleTimeString(); },1000);

// ── Router ───────────────────────────────────────────────────────────────────
const TITLES = {dashboard:'Dashboard',pipeline:'Data Pipeline',models:'ML Models',scorer:'Live Scorer',alerts:'Alert Queue',cases:'Case Management',deployment:'Deployment',compliance:'Compliance',audit:'Audit Log'};

async function go(page) {
  if(_liveFeedTimer){clearInterval(_liveFeedTimer);_liveFeedTimer=null;}
  Object.values(_chartInst).forEach(c=>{try{c.destroy()}catch(e){}});
  _chartInst={};
  document.querySelectorAll('.ni').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')===`go('${page}')`);
  });
  $('page-title').textContent = TITLES[page]||page;
  $('content').innerHTML = `<div style="padding:40px;text-align:center;color:var(--tx2)"><div class="spin"></div></div>`;

  await ({
    dashboard, pipeline, models, scorer,
    alerts, cases, deployment, compliance, audit
  }[page] || dashboard)();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function dashboard() {
  const stats = await api('/api/stats') || {};
  $('content').innerHTML = `
<div class="mrow">
  <div class="mc"><div class="ml">Alerts today</div><div class="mv">${stats.alerts_today||'—'}</div><div class="md r">${stats.critical_alerts||0} critical open</div></div>
  <div class="mc"><div class="ml">False-positive rate</div><div class="mv">${stats.fp_reduction_pct?100-stats.fp_reduction_pct+'%':'—'}</div><div class="md">↓ ${stats.fp_reduction_pct||40}% vs rule-based</div></div>
  <div class="mc"><div class="ml">SARs filed (30d)</div><div class="mv">${stats.sar_filed_30d||'—'}</div><div class="md">↑ 2 from prior period</div></div>
  <div class="mc"><div class="ml">Avg. review time</div><div class="mv">${stats.avg_review_time_h||'—'}h</div><div class="md">↓ ${stats.investigator_hours_saved_pct||51}% vs baseline</div></div>
</div>
<div class="g3">
  <div class="card"><div class="ch"><span class="ct">Alert volume — 30 days (ML vs rule-based)</span></div><div class="cb"><div class="cw"><canvas id="volChart"></canvas></div></div></div>
  <div class="card"><div class="ch"><span class="ct">Alert type breakdown</span></div><div class="cb"><div class="cw"><canvas id="typeChart"></canvas></div></div></div>
</div>
<div class="g2">
  <div class="card"><div class="ch"><span class="ct">Recent alerts</span><span style="font-size:11px;color:var(--mid);cursor:pointer" onclick="go('alerts')">View all →</span></div><div id="alert-preview" style="padding:0"></div></div>
  <div class="card"><div class="ch"><span class="ct">Live transaction feed</span><span style="font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px"><span class="dot"></span>Live</span></div><div id="live-feed" style="height:240px;overflow:hidden;padding:8px 12px"></div></div>
</div>`;

  // Charts
  _chartInst.vol = new Chart($('volChart'),{type:'line',data:{
    labels:Array.from({length:30},(_,i)=>`D-${30-i}`),
    datasets:[
      {label:'Rule-based',data:Array.from({length:30},()=>Math.round(135+Math.random()*25)),borderColor:'#D8DCE8',borderWidth:1.5,pointRadius:0,tension:.3,fill:false},
      {label:'AI/ML',data:Array.from({length:30},()=>Math.round(72+Math.random()*18)),borderColor:'#1E50B4',borderWidth:2,pointRadius:0,tension:.3,fill:{target:'origin',above:'rgba(30,80,180,.06)'}},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:10,font:{size:10}}}},scales:{x:{ticks:{maxTicksLimit:6,font:{size:9}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}}}}});
  _chartInst.type = new Chart($('typeChart'),{type:'doughnut',data:{
    labels:['Structuring','Layering','Sanctions','Crypto','Trade AML','Other'],
    datasets:[{data:[32,24,18,12,8,6],backgroundColor:['#1E50B4','#7832B4','#E24B4A','#1EA064','#B8490A','#8892AA'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:9,font:{size:10},padding:7}}}}});

  // Alert preview
  const adata = await api('/api/alerts') || {};
  const alerts = (adata.alerts||[]).slice(0,5);
  $('alert-preview').innerHTML = `<table><thead><tr><th>ID</th><th>Entity</th><th>Score</th><th>Priority</th><th>Status</th></tr></thead><tbody>
    ${alerts.map(a=>`<tr onclick="go('alerts');setTimeout(()=>openAlertDetail('${a.id}'),80)" style="cursor:pointer">
      <td style="font-family:monospace;font-size:11px">${a.id}</td><td style="font-weight:500">${a.entity}</td>
      <td><span style="font-weight:700;color:${sc(a.score)}">${a.score}</span></td>
      <td>${pb(a.priority)}</td><td>${sb(a.status)}</td></tr>`).join('')}
    </tbody></table>`;
  $('alert-count').textContent = (adata.alerts||[]).filter(a=>a.status==='open').length;

  // Live feed
  startLiveFeed();
}

// ── Pipeline ──────────────────────────────────────────────────────────────────
async function pipeline() {

  $('content').innerHTML = `
<div class="mrow">

</div>
<div class="mg">
${mdefs.map(md=>{const met=m[md.key]||{};return`
<div class="mcard">
  <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><div style="width:9px;height:9px;border-radius:50%;background:${md.col}"></div><div class="mname">${md.name}</div></div>

  <div class="msr"><span class="msrl">${l}</span><span class="msrv">${v}</span></div>
  <div class="pb"><div class="pf" style="width:${typeof v==='string'&&v.includes('%')?v:((met.auc||0.8)*100)+'%'};background:${md.col}"></div></div>`).join('')}
</div>`}).join('')}
</div>
<div class="g2">

  <div class="card"><div class="ch"><span class="ct">Retrain controls</span></div><div class="cb">

async function retrain() {
  $('retrain-status').textContent='Retraining…';
  const r = await api('/api/models/retrain',{method:'POST',body:'{}'});
  if(r?.ok) {
    toast('Retraining started — models will update in ~20 seconds');
    setTimeout(()=>{ models(); },22000);
  }
}

async function alertAction(id, action) {
  const notes = action==='clear'?prompt('Reason for clearing (optional):',''):
                action==='create_case'?prompt('Initial case notes:',''):'';
  const r = await api(`/api/alerts/${id}/action`,{method:'POST',body:JSON.stringify({action,notes:notes||'',officer:'J. Mensah'})});
  if(r?.ok) {
    toast(action==='create_case'?`Case ${r.case_id} created`:action==='clear'?'Alert cleared':'Alert escalated');
    if(action==='create_case') setTimeout(()=>go('cases'),1000);
    else { _detailAlertId=null; go('alerts'); }
  }
}

function startLiveFeed() {
  const feed=$('live-feed');
  if(!feed)return;
  async function tick(){
    const txn = await api('/api/live/transaction');
    if(!txn||!$('live-feed'))return;
    const col=sc(txn.score);
    const row=document.createElement('div');
    row.className='lr';
    row.innerHTML=`<div class="lsc" style="background:${txn.score>=65?col+'22':'#E0F5EC44'};color:${col}">${txn.score}</div><span style="flex:1;font-weight:500;font-size:12px">${txn.entity}</span><span style="color:var(--tx2);font-size:11px">${txn.channel}</span><span style="font-weight:600;font-size:12px;margin-left:7px">${fmt(txn.amount)}</span>${txn.alert_id?`<span style="font-size:10px;color:var(--red);margin-left:5px;font-family:monospace">⚠${txn.alert_id}</span>`:''}`;
    feed.prepend(row);
    while(feed.children.length>8)feed.removeChild(feed.lastChild);
    $('txn-rate').innerHTML=`<span class="dot"></span>${((txn.score||0),(12800+Math.round(Math.random()*400))).toLocaleString()} txns/min`;
  }
  tick();
  _liveFeedTimer=setInterval(tick,1100);
}

  <div class="mc"><div class="ml">Current drift score</div><div class="mv">${report.current_drift||'—'}</div><div class="md ${report.current_drift>0.1?'r':''}">Threshold: 0.10 ${report.current_drift<0.1?'✓':'⚠'}</div></div>
  <div class="mc"><div class="ml">Rolling AUC-ROC</div><div class="mv">${report.current_auc||'—'}</div><div class="md">Target: > 0.92 ✓</div></div>
  <div class="mc"><div class="ml">Rolling FP rate</div><div class="mv">${report.current_fp_rate?Math.round(report.current_fp_rate*100)+'%':'—'}</div><div class="md">↓ from 98% baseline</div></div>
  <div class="mc"><div class="ml">Txns since retrain</div><div class="mv">${(report.total_scored_since_retrain||0).toLocaleString()}</div><div class="md">Labels: ${report.outcome_labels_available||0}</div></div>
</div>
<div style="margin-bottom:14px;padding:12px 14px;background:${report.retrain_needed?'var(--lorange)':'var(--lgreen)'};border-radius:8px;font-size:13px;border:1px solid ${report.retrain_needed?'#E0B090':'#90D4B8'}">
  <strong>Status:</strong> ${report.status||'—'} · Next scheduled retrain: ${report.next_scheduled_retrain||'—'}
  ${report.retrain_needed?'<button class="btn warn" onclick="retrain()" style="margin-left:12px;font-size:11px">Retrain now</button>':''}
</div>
<div class="g2" style="margin-bottom:14px">
  <div class="card"><div class="ch"><span class="ct">Feature drift (PSI) — 12 weeks</span><span style="font-size:11px;color:var(--tx2)">Threshold 0.10 = retrain</span></div><div class="cb"><div class="cw"><canvas id="driftMon"></canvas></div></div></div>
  <div class="card"><div class="ch"><span class="ct">Rolling AUC-ROC — 12 weeks</span></div><div class="cb"><div class="cw"><canvas id="aucMon"></canvas></div></div></div>
</div>
<div class="g2">
  <div class="card"><div class="ch"><span class="ct">Top drifted features</span></div><div class="cb">
    <table><thead><tr><th>Feature</th><th>PSI</th><th>KS stat</th><th>Trend</th><th>Alert</th></tr></thead><tbody>
    ${(report.top_drifted_features||[]).map(f=>`<tr>
      <td style="font-family:monospace;font-size:12px">${f.feature}</td>
      <td style="font-weight:500;color:${f.psi>0.1?'var(--red)':'var(--tx)'}">${f.psi}</td>
      <td>${f.ks}</td>
      <td>${f.trend}</td>
      <td><span class="bp ${f.psi>0.1?'bc':'bf'}">${f.psi>0.1?'Alert':'OK'}</span></td>
    </tr>`).join('')}
    </tbody></table>
  </div></div>
  <div class="card"><div class="ch"><span class="ct">False-positive rate trend</span></div><div class="cb"><div class="cw"><canvas id="fpMon"></canvas></div></div></div>
</div>`;

  const driftData = report.drift_series || [];
  const aucData = report.perf_series || [];
  const fpData = report.fp_rate_series || [];
  const threshold = report.retrain_threshold || 0.10;

  _chartInst.dm = new Chart($('driftMon'),{type:'line',data:{labels:weeks,datasets:[
    {label:'Feature drift (PSI)',data:driftData,borderColor:'#1E50B4',borderWidth:2,pointRadius:3,fill:false,tension:.3},
    {label:'Retrain threshold',data:Array(weeks.length).fill(threshold),borderColor:'#E24B4A',borderWidth:1.5,borderDash:[5,5],pointRadius:0,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:.2,ticks:{font:{size:9}}},x:{ticks:{font:{size:9}},grid:{display:false}}},plugins:{legend:{labels:{boxWidth:9,font:{size:10}}}}}});

  _chartInst.am = new Chart($('aucMon'),{type:'line',data:{labels:weeks,datasets:[
    {label:'AUC-ROC',data:aucData,borderColor:'#0F6E56',borderWidth:2,pointRadius:3,fill:{target:'origin',above:'rgba(15,110,86,.06)'},tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:.85,max:1,ticks:{font:{size:9}}},x:{ticks:{font:{size:9}},grid:{display:false}}},plugins:{legend:{display:false}}}});

  _chartInst.fm = new Chart($('fpMon'),{type:'line',data:{labels:weeks,datasets:[
    {label:'FP rate',data:fpData,borderColor:'#B8490A',borderWidth:2,pointRadius:3,fill:false,tension:.3},
    {label:'Baseline (rule-based)',data:Array(weeks.length).fill(0.97),borderColor:'#D8DCE8',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:.5,max:1,ticks:{font:{size:9},callback:v=>Math.round(v*100)+'%'}},x:{ticks:{font:{size:9}},grid:{display:false}}},plugins:{legend:{labels:{boxWidth:9,font:{size:10}}}}}});
}

// ── Patch sidebar & router ────────────────────────────────────────────────
document.querySelector('.nav').insertAdjacentHTML('beforeend', `
  <div class="nav-sec">SAR & Quality</div>
  <div class="ni" onclick="go('sar')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="1" width="12" height="14" rx="1"/><path d="M5 5h6M5 8h6M5 11h4"/></svg>SAR Workbench</div>
  <div class="ni" onclick="go('features')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 2h3v3H2zM6.5 2h3v3h-3zM11 2h3v3h-3zM2 6.5h3v3H2zM6.5 6.5h3v3h-3zM11 6.5h3v3h-3zM2 11h3v3H2zM6.5 11h3v3h-3z"/></svg>Feature Engineering</div>
  <div class="ni" onclick="go('monitoring')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 11l4-4 3 3 4-5 3 2"/><rect x="1" y="1" width="14" height="14" rx="1"/></svg>Model Monitoring</div>
`);

// Extend titles and pages maps
Object.assign(TITLES, {sar:'SAR Workbench', features:'Feature Engineering', monitoring:'Model Monitoring'});

const _origGo = window.go;
window.go = async function(page) {
  const extras = {sar: sarWorkbench, features: featureDetail, monitoring};
  if(extras[page]) {
    if(window._liveFeedTimer){clearInterval(window._liveFeedTimer);window._liveFeedTimer=null;}
    Object.values(window._chartInst||{}).forEach(c=>{try{c.destroy()}catch(e){}});
    window._chartInst = {};
    document.querySelectorAll('.ni').forEach(el=>{
      el.classList.toggle('active', el.getAttribute('onclick')===`go('${page}')`);
    });
    $('page-title').textContent = TITLES[page]||page;
    $('content').innerHTML = `<div style="padding:40px;text-align:center;color:var(--tx2)"><div class="spin"></div></div>`;
    await extras[page]();
  } else {
    await _origGo(page);
  }
};
</script>
